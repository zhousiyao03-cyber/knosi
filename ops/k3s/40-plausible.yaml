---
# Plausible Community Edition — privacy-friendly web analytics
# Stack: Postgres (app DB) + ClickHouse (events DB) + Plausible app
# Namespace is isolated so it can be removed cleanly without touching knosi.

apiVersion: v1
kind: Namespace
metadata:
  name: plausible
---
# ─────────────────────────── Secrets ───────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: plausible-env
  namespace: plausible
type: Opaque
stringData:
  # Postgres credentials (used by both Postgres and Plausible)
  POSTGRES_USER: plausible
  POSTGRES_PASSWORD: cFDRnnz38FmtgXMFACHs2g
  POSTGRES_DB: plausible_db
  # Plausible app secrets
  SECRET_KEY_BASE: JhyJuEK9ZqLAtU8Oisqpam45JgjJ3IX9ZqjNi3ISJMJDk7HcbsQz8zLb2Qc+sqCS
  BASE_URL: https://plausible.knosi.xyz
  # invite_only = registration UI disabled, only you (the bootstrap admin)
  # can create new users via the in-app invite flow.
  DISABLE_REGISTRATION: "invite_only"
---
# ─────────────────────────── Postgres ──────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plausible-postgres
  namespace: plausible
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: plausible
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef:
                name: plausible-env
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "plausible", "-d", "plausible_db"]
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 30m
              memory: 96Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: plausible-postgres
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: plausible
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
---
# ─────────────────────────── ClickHouse ────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: plausible-clickhouse
  namespace: plausible
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 4Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: clickhouse-config
  namespace: plausible
data:
  # Trim ClickHouse memory + log footprint for a 4GB single node.
  low-resource.xml: |
    <clickhouse>
      <logger>
        <level>warning</level>
        <console>true</console>
      </logger>
      <max_server_memory_usage_to_ram_ratio>0.5</max_server_memory_usage_to_ram_ratio>
      <mark_cache_size>524288000</mark_cache_size>
      <profiles>
        <default>
          <max_memory_usage>500000000</max_memory_usage>
          <max_bytes_before_external_group_by>200000000</max_bytes_before_external_group_by>
          <max_bytes_before_external_sort>200000000</max_bytes_before_external_sort>
        </default>
      </profiles>
    </clickhouse>
  user-config.xml: |
    <clickhouse>
      <profiles>
        <default>
          <log_queries>0</log_queries>
          <log_query_threads>0</log_query_threads>
        </default>
      </profiles>
    </clickhouse>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clickhouse
  namespace: plausible
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.12-alpine
          ports:
            - containerPort: 8123
            - containerPort: 9000
          env:
            - name: CLICKHOUSE_SKIP_USER_SETUP
              value: "1"
          volumeMounts:
            - name: data
              mountPath: /var/lib/clickhouse
            - name: config
              mountPath: /etc/clickhouse-server/config.d/low-resource.xml
              subPath: low-resource.xml
            - name: config
              mountPath: /etc/clickhouse-server/users.d/user-config.xml
              subPath: user-config.xml
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 768Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: plausible-clickhouse
        - name: config
          configMap:
            name: clickhouse-config
---
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: plausible
spec:
  selector:
    app: clickhouse
  ports:
    - name: http
      port: 8123
      targetPort: 8123
    - name: native
      port: 9000
      targetPort: 9000
---
# ─────────────────────────── Plausible app ─────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: plausible
  namespace: plausible
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: plausible
  template:
    metadata:
      labels:
        app: plausible
    spec:
      # Wait for DBs before starting the app — Plausible's entrypoint
      # runs migrations on boot and will crash if either DB isn't ready.
      initContainers:
        - name: wait-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -U plausible -d plausible_db; do
                echo "waiting for postgres"
                sleep 2
              done
        - name: wait-clickhouse
          image: curlimages/curl:8.11.0
          command:
            - sh
            - -c
            - |
              until curl -fsS http://clickhouse:8123/ping; do
                echo "waiting for clickhouse"
                sleep 2
              done
      containers:
        - name: plausible
          image: ghcr.io/plausible/community-edition:v3.0.1
          command: ["/bin/sh", "-c"]
          args:
            - "/entrypoint.sh db migrate && /entrypoint.sh run"
          env:
            - name: DATABASE_URL
              value: "postgres://plausible:cFDRnnz38FmtgXMFACHs2g@postgres:5432/plausible_db"
            - name: CLICKHOUSE_DATABASE_URL
              value: "http://clickhouse:8123/plausible_events_db"
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: plausible-env
                  key: SECRET_KEY_BASE
            - name: BASE_URL
              valueFrom:
                secretKeyRef:
                  name: plausible-env
                  key: BASE_URL
            - name: DISABLE_REGISTRATION
              valueFrom:
                secretKeyRef:
                  name: plausible-env
                  key: DISABLE_REGISTRATION
            - name: HTTP_PORT
              value: "8000"
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: plausible
  namespace: plausible
spec:
  selector:
    app: plausible
  ports:
    - port: 8000
      targetPort: 8000
---
# ─────────────────────────── Ingress ───────────────────────────
# Lives in the `plausible` namespace because Traefik Ingress rules can only
# point to Services in the same namespace. Caddy on the host terminates TLS
# and forwards plausible.knosi.xyz -> Traefik NodePort -> this ingress.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: plausible
  namespace: plausible
spec:
  ingressClassName: traefik
  rules:
    - host: plausible.knosi.xyz
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: plausible
                port:
                  number: 8000
