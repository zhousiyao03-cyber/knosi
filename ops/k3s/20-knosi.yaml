---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knosi
  namespace: knosi
  labels:
    app: knosi
spec:
  replicas: 1
  # Production runs against remote Turso (TURSO_DATABASE_URL is set in
  # knosi-env), so the container is stateless and can roll without a PVC.
  #
  # maxSurge=0 / maxUnavailable=1: the host is a 4 GB CX23 and the pod's
  # memory limit is 1.5 Gi (Next.js + in-process Transformers.js embedding
  # + cross-encoder reranker). Allowing maxSurge=1 would briefly run two
  # pods at ~3 Gi combined, which combined with Caddy + Traefik + system
  # memory blew past host RAM and caused both pods to OOM during rollouts.
  # The trade-off is a ~15s 503 window per deploy while the new pod boots,
  # which is acceptable for a single-tenant app. Revisit if we move to a
  # bigger node or split inference into a separate Deployment.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: knosi
  template:
    metadata:
      labels:
        app: knosi
    spec:
      initContainers:
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "waiting for redis..."
              until nc -z redis.knosi.svc.cluster.local 6379; do
                sleep 2
              done
              echo "redis ready"
      containers:
        - name: knosi
          image: docker.io/library/knosi:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: knosi-env
          env:
            - name: NODE_ENV
              value: production
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            - name: REDIS_URL
              value: "redis://redis.knosi.svc.cluster.local:6379"
            # Turso is in aws-us-east-1; round-trip from Hetzner (nbg1) is
            # ~100ms so indexed point-lookups routinely trip the 100ms default.
            # Raise to 300ms so the slow-query log flags real regressions, not
            # the geo-latency floor. Lower this again if we move to embedded
            # replicas or an eu-west Turso region.
            - name: SLOW_QUERY_MS
              value: "300"
          # All three probes target /api/healthz, a static 200 with no DB
          # or Redis call. Previously they hit /login, which triggered a
          # React SSR + Turso lookup on every probe — under memory pressure
          # the SSR itself slowed the probe enough to fail liveness, which
          # then killed an otherwise-recoverable pod. The healthz route
          # only reflects "Node process is up", which is what kubelet
          # actually needs to decide whether to restart.
          startupProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          # When a pod enters Terminating, the endpoints controller removes
          # its IP from the Service, but Traefik takes a beat to observe the
          # change. Without preStop, SIGTERM arrives at the same instant the
          # endpoint is removed, so requests in flight from Traefik's stale
          # view get a 502. Sleep covers that propagation window so the pod
          # keeps serving until Traefik has actually rotated traffic away.
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 8"]
          resources:
            requests:
              cpu: 100m
              # Reflects the real working-set after Next.js boot + lazy
              # Transformers.js model load. 256Mi was a guess from before
              # the embedding/reranker moved in-process.
              memory: 512Mi
            limits:
              cpu: 1000m
              # Headroom for: Next.js runtime (~300Mi), embedding model
              # (~200Mi q8), cross-encoder reranker (~200Mi q8), Drizzle
              # + libsql + Milvus + Langfuse SDKs (~150Mi), and request
              # bursts. 768Mi was OOMing within minutes once both ML
              # pipelines were active. Bump to 1.5Gi until inference is
              # split into its own Deployment.
              memory: 1536Mi
---
apiVersion: v1
kind: Service
metadata:
  name: knosi
  namespace: knosi
spec:
  selector:
    app: knosi
  ports:
    - port: 3000
      targetPort: 3000
